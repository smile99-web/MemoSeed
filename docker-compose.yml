services:
  postgres:
    image: postgres:16-alpine
    container_name: memoseed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-memoseed}
      POSTGRES_USER: ${POSTGRES_USER:-memoseed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memoseed_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memoseed} -d ${POSTGRES_DB:-memoseed}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memoseed-network

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: memoseed-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-memoseed}:${POSTGRES_PASSWORD:-memoseed_password}@postgres:5432/${POSTGRES_DB:-memoseed}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    networks:
      - memoseed-network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: memoseed-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      API_PROXY_BASE_URL: http://backend:8000/api/v1
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
      - frontend_next:/app/frontend/.next
    networks:
      - memoseed-network

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:

networks:
  memoseed-network:
    driver: bridge
