services:
  backend:
    build:
      target: production
    environment:
      APP_ENV: production
    volumes: []

  frontend:
    build:
      target: production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      API_PROXY_BASE_URL: http://backend:8000/api/v1
    volumes: []
